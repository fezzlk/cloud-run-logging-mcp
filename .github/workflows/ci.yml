name: MCP checks

on:
  pull_request:
    paths: ['server.js', 'lib/**', 'package.json', '.github/workflows/ci.yml']
  push:
    branches: [main]
    paths: ['server.js', 'lib/**', 'package.json', '.github/workflows/ci.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloud-run-logging-mcp-ci
  cancel-in-progress: true

jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node --check server.js
      - run: find lib -name '*.js' -print0 | xargs -0 -n1 node --check
